global:
  scrape_interval: 15s

scrape_configs:

  - job_name: bot
    static_configs:
      - targets:
          - bot:8001

  - job_name: extractor
    static_configs:
      - targets:
          - extractor:8002

  - job_name: agentia
    static_configs:
      - targets:
          - agentia:8003

  - job_name: publisher
    static_configs:
      - targets:
          - publisher:8004

  - job_name: rabbitmq-exporter
    static_configs:
      - targets:
          - rabbitmq-exporter:9419

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100